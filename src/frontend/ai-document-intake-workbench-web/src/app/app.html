<main class="shell">
  <section class="intro" aria-labelledby="app-title">
    <p class="eyebrow">PR01 application shell</p>
    <h1 id="app-title">{{ appName }}</h1>
    <p class="summary">
      Backend and frontend shells are in place for local development. Product workflow behavior will be added in later PRs.
    </p>
  </section>

  <section class="status" aria-label="Current shell status">
    <div>
      <span class="label">Backend</span>
      <strong>ASP.NET Core API shell</strong>
    </div>
    <div>
      <span class="label">Frontend</span>
      <strong>Angular application shell</strong>
    </div>
    <div>
      <span class="label">Scope</span>
      <strong>No workflow features implemented</strong>
    </div>
  </section>
</main>
